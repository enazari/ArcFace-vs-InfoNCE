session: clip

backbone:
  name: clip
  clip_model: "ViT-B-32"
  clip_pretrained: "openai"
  embedding_dim: 512
  dropout: 0.0

loss:
  name: infonce
  temperature: 0.07

training:
  epochs: 0
  batch_size: 256
  lr: 0.0
  momentum: 0.9
  weight_decay: 0.0
  warmup_epochs: 0
  num_workers: 6
  mixed_precision: fp16
  eval_every: 1
