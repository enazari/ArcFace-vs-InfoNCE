session: clip_lora

data:
  ms1m_dir: data/MS1M-ArcFace
  num_identities: 85742
  val_fraction: 0.2

backbone:
  name: clip
  clip_model: "ViT-B-32"
  clip_pretrained: "openai"
  embedding_dim: 512
  dropout: 0.0
  lora:
    rank: 8
    alpha: 8
    targets: ["c_fc", "c_proj"]

loss:
  name: infonce
  temperature: 0.07

training:
  epochs: 15
  batch_size: 4100
  lr: 0.001
  momentum: 0.9
  weight_decay: 0.0005
  warmup_epochs: 5
  num_workers: 6
  mixed_precision: fp16
  eval_every: 5
