session: jepa_lora

data:
  ms1m_dir: data/MS1M-ArcFace
  num_identities: 85742
  val_fraction: 0.2

backbone:
  name: jepa
  embedding_dim: 1280
  dropout: 0.0
  lora:
    rank: 8
    alpha: 8
    targets: ["fc1", "fc2"]

loss:
  name: infonce
  temperature: 0.07

training:
  epochs: 5
  batch_size: 120
  lr: 0.001
  momentum: 0.9
  weight_decay: 0.0005
  warmup_epochs: 5
  num_workers: 6
  mixed_precision: fp16
  eval_every: 5
